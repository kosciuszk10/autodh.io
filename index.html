<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конфигуратор Интерьера | Auto Studio DH</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --text-main: #f5f5f5;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .configurator-container {
            background-color: var(--surface-color);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            max-width: 900px;
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            align-items: center;
        }

        /* Блок с изображением */
        .preview-box {
            position: relative;
            flex: 1;
            min-width: 300px;
            border-radius: 8px;
            overflow: hidden;
            background-color: #000;
        }

        .preview-box img {
            width: 100%;
            display: block;
            /* Делаем базовое фото черно-белым для чистого наложения цвета */
            filter: grayscale(100%) contrast(1.2); 
        }

        /* Слой цвета, который накладывается поверх фото */
        .color-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #8b0000; /* Цвет по умолчанию (Bordeaux) */
            /* Магия CSS: режим наложения цвета, сохраняющий тени и блики */
            mix-blend-mode: color; 
            transition: background-color 0.5s ease;
            pointer-events: none; /* Чтобы слой не мешал кликать, если поверх будут другие элементы */
        }

        /* Блок управления цветами */
        .controls {
            flex: 1;
            min-width: 300px;
        }

        .controls h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .controls p {
            color: #a0a0a0;
            margin-bottom: 30px;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .color-options {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .color-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: transform 0.3s, border-color 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .color-btn:hover {
            transform: scale(1.1);
        }

        .color-btn.active {
            border-color: #fff;
            transform: scale(1.1);
        }

        /* Подписи к цветам */
        .selected-color-name {
            margin-top: 20px;
            font-weight: 600;
            font-size: 1.1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="configurator-container">
        <div class="preview-box">
            <img src="https://images.unsplash.com/photo-1550355291-bbee04a92027?auto=format&fit=crop&w=800&q=80" alt="Салон авто">
            <div class="color-overlay" id="car-overlay"></div>
        </div>

        <div class="controls">
            <h2>Свой стиль</h2>
            <p>Выберите цвет кожи или алькантары для вашего проекта. Наш конфигуратор поможет представить будущий результат.</p>
            
            <div class="color-options">
                <button class="color-btn active" style="background-color: #8b0000;" data-color="#8b0000" data-name="Bordeaux Red"></button>
                <button class="color-btn" style="background-color: #d4af37;" data-color="#d4af37" data-name="Sahara Gold"></button>
                <button class="color-btn" style="background-color: #8B4513;" data-color="#8B4513" data-name="Cognac Brown"></button>
                <button class="color-btn" style="background-color: #2F4F4F;" data-color="#2F4F4F" data-name="Emerald Green"></button>
                <button class="color-btn" style="background-color: #111111;" data-color="#111111" data-name="Carbon Black"></button>
            </div>

            <div class="selected-color-name" id="color-label">Bordeaux Red</div>
        </div>
    </div>

    <script>
        // Получаем элементы
        const buttons = document.querySelectorAll('.color-btn');
        const overlay = document.getElementById('car-overlay');
        const colorLabel = document.getElementById('color-label');

        // Добавляем обработчик событий на каждую кнопку
        buttons.forEach(button => {
            button.addEventListener('click', function() {
                // Убираем класс active у всех кнопок
                buttons.forEach(btn => btn.classList.remove('active'));
                
                // Добавляем класс active нажатой кнопке
                this.classList.add('active');

                // Получаем цвет и название из data-атрибутов
                const newColor = this.getAttribute('data-color');
                const newName = this.getAttribute('data-name');

                // Применяем новый цвет к наложению
                overlay.style.backgroundColor = newColor;
                
                // Обновляем текст
                colorLabel.textContent = newName;
            });
        });
    </script>

</body>
</html>
